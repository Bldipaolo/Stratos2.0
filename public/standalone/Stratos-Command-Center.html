<script>
const DATA=JSON.parse(document.getElementById('stratos-data').textContent),$=(s,r=document)=>r.querySelector(s),$$=(s,r=document)=>Array.from(r.querySelectorAll(s));
const fmt=n=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n||0),esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const toast=t=>{const el=$('#toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)};
const sections=[['cockpit','01','Command Cockpit','Command'],['leads','02','Lead War Room','Command'],['profit','03','Profit Board','Sales'],['offers','04','Offer Ladder','Sales'],['swarm','05','Agent Swarm','Command'],['ops','06','Operations OS','Ops'],['automations','07','Automation Library','Ops'],['demos','08','Demo Gallery','Proof'],['proof','09','Proof Ledger','Proof'],['outreach','10','Outreach Vault','Sales']].map(([id,icon,label,group])=>({id,icon,label,group}));
function buildNav(){const groups=[...new Set(sections.map(s=>s.group))];$('#nav').innerHTML=groups.map(g=>`<div class="navgroup"><small>${g}</small>${sections.filter(s=>s.group===g).map(s=>`<button class="navbtn" data-route="${s.id}"><i>${s.icon}</i><span>${s.label}</span></button>`).join('')}</div>`).join('');$('#nav').onclick=e=>{const b=e.target.closest('button[data-route]');if(b)route(b.dataset.route)}}
function setActive(id){$$('.navbtn').forEach(b=>b.classList.toggle('active',b.dataset.route===id));$('#title').textContent=sections.find(s=>s.id===id)?.label||'Command Center';history.replaceState(null,'','#'+id)}
function kpi(label,value,note){return `<div class="kpi"><small>${label}</small><b>${value}</b><span>${note||''}</span></div>`}
function cockpit(){const m=DATA.metrics,top=[...DATA.leads].sort((a,b)=>b.score-a.score).slice(0,3);return `<div class="grid"><section class="hero"><div class="panel"><span class="truth">Truth-safe operating system</span><h2 style="margin-top:16px">One standalone Stratos hub for leads, profits, proof, automations, demos, Ruflo swarm coordination, and daily execution.</h2><p class="lede">This is not the GitHub repo UI. It is a self-contained command center artifact that opens directly as one HTML file and uses the absorbed Stratos database as its embedded brain.</p><div class="kpis">${kpi('Targets',m.leadCount,'Boca prospects embedded')}${kpi('Avg score',m.avgScore,'lead quality index')}${kpi('Pipeline upside',fmt(m.projectedMonthlyPipeline),'transparent opportunity math')}${kpi('Demos',m.demoCount,'vertical proof assets')}</div></div><div class="panel"><p class="eyebrow">Next irreversible move</p><h2>Send 3 precision first touches today.</h2><p>Start with the highest score + easiest proof angle. Attach a close-room/demo only after interest.</p>${top.map(l=>`<div class="row"><span><b>${esc(l.business)}</b><br><small class="muted">${esc(l.industry)} · ${esc(l.offer)}</small></span><span class="money">${fmt(l.estBookings*l.avgValue)}</span></div>`).join('')}<button class="btn primary" onclick="route('outreach')">Compose outreach</button></div></section><section class="panel"><p class="eyebrow">Operating lanes</p><div class="lanes">${DATA.premiumOps.operatingSystem.map(l=>`<div class="lane"><h3>${esc(l.lane)}</h3><p>${esc(l.goal)}</p><small class="tag">${esc(l.ownerMetric)}</small><ul>${l.dailyMoves.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`).join('')}</div></section></div>`}
function leadCard(l){return `<article class="leadcard"><div class="leadtop"><div><span class="tag">${esc(l.industry)}</span><h3 style="margin-top:10px">${esc(l.business)}</h3><p style="margin:.35rem 0 0">${esc(l.address)}</p></div><div class="score">${l.score}</div></div><div><b>Angle:</b><p style="margin:4px 0 0">${esc(l.angle)}</p></div><div><b>Leaks to fix</b><ul>${(l.weaknesses||[]).slice(0,3).map(w=>`<li>${esc(w)}</li>`).join('')}</ul></div><div class="row"><span>Projected monthly upside</span><span class="money">${fmt(l.estBookings*l.avgValue)}</span></div><div class="actions"><a class="btn" href="${esc(l.website||'#')}" target="_blank">Website</a><a class="btn good" href="${esc('.'+l.demo)}">Demo</a><button class="btn primary" onclick="composeFor('${esc(l.id)}')">Pitch</button></div></article>`}
function leads(){return `<section class="panel"><p class="eyebrow">Lead War Room</p><h2>Prioritized Boca prospects with offer angle, leak diagnosis, and upside math.</h2><div class="toolbar"><input class="input" id="q" placeholder="Search business, vertical, offer, weakness..."><select class="input" id="industry"><option>All industries</option>${[...new Set(DATA.leads.map(l=>l.industry))].map(i=>`<option>${esc(i)}</option>`).join('')}</select><select class="input" id="sort"><option value="score">Sort by score</option><option value="upside">Sort by upside</option><option value="bookings">Sort by bookings</option></select></div><div class="cards" id="leadList"></div></section>`}
function renderLeadList(){const q=($('#q')?.value||'').toLowerCase(),ind=$('#industry')?.value,sort=$('#sort')?.value||'score';let rows=DATA.leads.filter(l=>(!q||JSON.stringify(l).toLowerCase().includes(q))&&(ind==='All industries'||l.industry===ind));rows.sort((a,b)=>sort==='upside'?(b.estBookings*b.avgValue)-(a.estBookings*a.avgValue):sort==='bookings'?b.estBookings-a.estBookings:b.score-a.score);$('#leadList').innerHTML=rows.map(leadCard).join('')||'<p>No matching leads.</p>'}
function profit(){return `<div class="split"><section class="panel"><p class="eyebrow">Profit Board</p><h2>Offer + pipeline simulator</h2><p>Transparent opportunity math. This models potential client value / Stratos revenue planning — not guaranteed outcomes.</p>${slider('deals','Closed deals',0,8,1,2)}${slider('setup','Average setup',3000,12000,500,6500)}${slider('monthly','Average monthly',0,5000,250,1500)}${slider('months','Months retained',1,12,1,6)}<div class="row"><span>Modeled contract value</span><span class="calcOut" id="totalOut"></span></div></section><section class="panel"><p class="eyebrow">Embedded pricing defaults</p>${Object.entries(DATA.demoSystem.pricingDefaults).map(([name,p])=>`<div class="row"><span><b>${esc(name)}</b><br><small class="muted">setup + monthly</small></span><span class="money">${fmt(p.setup)} + ${fmt(p.monthly)}/mo</span></div>`).join('')}<p>Automation catalog if bundled monthly: <b class="money">${fmt(DATA.metrics.automationCatalogMonthly)}/mo</b></p></section><section class="panel wide"><div class="kpis">${kpi('Lead upside',fmt(DATA.metrics.projectedMonthlyPipeline),'sum of embedded lead projections')}${kpi('Automation catalog',fmt(DATA.metrics.automationCatalogMonthly),'monthly line items')}${kpi('Offer tiers',DATA.metrics.offerCount,'Launch → Retainer')}${kpi('Top lead value',fmt(Math.max(...DATA.leads.map(l=>l.estBookings*l.avgValue))),'single prospect upside')}</div></section></div>`}
function slider(id,label,min,max,step,val){return `<div class="sliderrow"><label>${label} <input id="${id}" type="range" min="${min}" max="${max}" step="${step}" value="${val}"></label><b id="${id}V"></b></div>`}
function updateProfit(){['deals','setup','monthly','months'].forEach(id=>{const el=$('#'+id),out=$('#'+id+'V');if(el&&out)out.textContent=(id==='deals'||id==='months')?el.value:fmt(+el.value)});$('#totalOut').textContent=fmt((+$('#deals').value)*(+$('#setup').value+(+$('#monthly').value)*(+$('#months').value)))}
function offers(){return `<section class="grid"><div class="panel"><p class="eyebrow">Offer Ladder</p><h2>Named packages prevent custom-pricing chaos.</h2></div><div class="cards">${DATA.growth.offerLadder.map(o=>`<article class="offer"><span class="tag">${esc(o.price)}</span><h3>${esc(o.name)}</h3><p>${esc(o.promise)}</p><ul>${o.deliverables.map(d=>`<li>${esc(d)}</li>`).join('')}</ul><p><b>Sales line:</b> ${esc(o.salesLine)}</p></article>`).join('')}</div></section>`}
function swarm(){const a=DATA.rufloArena,mission=DATA.latestMission;return `<div class="swarm"><section class="panel"><p class="eyebrow">Ruflo Agent Swarm</p><h2>${esc(a.name)}</h2><p>${esc(a.tagline)}</p><span class="truth">${esc(a.truthLabel)}</span><div class="toolbar"><select class="input" id="mode">${a.modes.map(m=>`<option value="${m.id}">${esc(m.name)}</option>`).join('')}</select><button class="btn primary" id="launchSwarm">Run browser simulation</button></div><div class="terminal" id="swarmLog">Latest mission: ${esc(mission.missionId)}\nObjective: ${esc(mission.objective)}\n\nReady.</div></section><section class="panel"><p class="eyebrow">Specialists</p><div class="agentgrid">${a.agents.map((ag,i)=>`<div class="agent" data-agent="${i}"><span class="tag">${esc(ag.type)}</span><h3 style="margin-top:10px">${esc(ag.name)}</h3><p>${esc(ag.role)}</p><small class="muted">${esc(ag.output)}</small></div>`).join('')}</div></section><section class="panel wide"><p class="eyebrow">Mission phases</p><div class="timeline">${a.phases.map(p=>`<div class="phase"><b>${esc(p.time)}</b><div><h3>${esc(p.name)}</h3><p>${p.actions.map(esc).join(' · ')}</p></div></div>`).join('')}</div></section></div>`}
function runSwarm(){const mode=DATA.rufloArena.modes.find(m=>m.id===$('#mode').value),log=$('#swarmLog'),lines=[`mode: ${mode.name}`,`objective: ${mode.objective}`,'spawn Queen Coordinator → mission coherence','spawn Boca Signal Hunter → vertical wedge','spawn Offer Architect → package + asset map','spawn Hermes Builder → static files/scripts/public export','spawn Proof Tester → validators + browser QA','spawn Close Reviewer → proof-safe sales copy','execution order: Hermes/Codex continues actual implementation after coordination'];log.textContent='';$$('.agent').forEach(x=>x.classList.remove('active'));lines.forEach((line,i)=>setTimeout(()=>{log.textContent+=(i?'\n':'')+'▸ '+line;if(i>1)$$('.agent')[Math.min(i-2,$$('.agent').length-1)]?.classList.add('active')},i*250))}
function ops(){return `<div class="grid"><section class="panel"><p class="eyebrow">Operations OS</p><h2>${esc(DATA.premiumOps.positioning.coreThesis)}</h2><p class="lede">${esc(DATA.premiumOps.positioning.buyerPromise)}</p></section><section class="panel"><div class="lanes">${DATA.opsLibrary.logistics.map(l=>`<div class="lane"><span class="tag">${esc(l.cadence)}</span><h3 style="margin-top:10px">${esc(l.lane)}</h3><p>${esc(l.action)}</p><small class="muted">Artifact: ${esc(l.artifact)}</small></div>`).join('')}</div></section><section class="panel"><p class="eyebrow">Today Action Board</p><div class="cards">${DATA.growth.todayMoves.slice(0,6).map(m=>`<article class="leadcard"><span class="tag">${esc(m.priority)}</span><h3>${esc(m.title)}</h3><p>${esc(m.outcome)}</p><ul>${m.actions.map(a=>`<li>${esc(a)}</li>`).join('')}</ul><small class="muted">Owner: ${esc(m.owner)} · ${esc(m.timebox)}</small></article>`).join('')}</div></section></div>`}
function automations(){return `<section class="grid"><div class="panel"><p class="eyebrow">Automation Library</p><h2>Sellable workflows + n8n delivery templates.</h2></div><div class="cards">${DATA.opsLibrary.n8nGuides.map(g=>`<article class="leadcard"><span class="tag">${esc(g.vertical)}</span><h3>${esc(g.name)}</h3><p>${esc(g.outcome)}</p><p><b>Trigger:</b> ${esc(g.trigger)}</p><ul>${g.nodes.map(n=>`<li>${esc(n)}</li>`).join('')}</ul><small class="muted">${esc(g.sellLine)}</small></article>`).join('')}${DATA.automations.map(a=>`<article class="leadcard"><span class="tag">${esc(a.category)} · ${fmt(a.price)}/mo</span><h3>${esc(a.name)}</h3><p>${esc(a.desc)}</p></article>`).join('')}</div></section>`}
function demos(){return `<section class="grid"><div class="panel"><p class="eyebrow">Demo Gallery</p><h2>Premium vertical demo systems, proof-labeled and ready to show.</h2><p>${esc(DATA.demoSystem.status)}</p></div><div class="cards">${DATA.demoSystem.verticals.map(v=>`<article class="demoCard" style="--accent:${esc(v.accent)}"><div class="demoVisual">${esc(v.vertical)}</div><div><span class="tag">${esc(v.price)}</span><h3 style="margin-top:10px">${esc(v.brand)}</h3><p>${esc(v.headline)}</p><p><b>Offer:</b> ${esc(v.offer)}</p><ul>${v.modules.map(m=>`<li>${esc(m)}</li>`).join('')}</ul><a class="btn good" href="${esc(v.demoPath)}">Open demo</a></div></article>`).join('')}</div></section>`}
function proof(){const ledger=DATA.premiumOps.proofLedger;return `<div class="split"><section class="panel"><p class="eyebrow">Proof Ledger</p><h2>Keep claims clean before Stratos scales.</h2>${ledger.rules.map(r=>`<p class="proofrule">${esc(r)}</p>`).join('')}</section><section class="panel"><p class="eyebrow">Capture checklist</p><ul>${ledger.captureChecklist.map(x=>`<li>${esc(x)}</li>`).join('')}</ul><h3>Statuses</h3><p>${ledger.statuses.map(s=>`<span class="tag">${esc(s)}</span>`).join(' ')}</p></section><section class="panel wide"><p class="eyebrow">Transparent case studies</p><div class="cards">${DATA.growth.caseStudies.map(c=>`<article class="leadcard"><span class="tag">${esc(c.label)}</span><h3>${esc(c.title)}</h3><p><b>Before:</b> ${esc(c.before)}</p><p><b>After:</b> ${esc(c.after)}</p><small class="muted">Guardrail: ${esc(c.claimGuardrail)}</small></article>`).join('')}</div></section></div>`}
function outreach(){return `<div class="split"><section class="panel"><p class="eyebrow">Outreach Vault</p><h2>Generate proof-safe first-touch copy.</h2><div class="toolbar"><select class="input" id="leadPick">${DATA.leads.map(l=>`<option value="${esc(l.id)}">${esc(l.business)}</option>`).join('')}</select><button class="btn primary" id="makePitch">Generate pitch</button><button class="btn" id="copyPitch">Copy</button></div><textarea class="input" id="pitchBox" style="width:100%;min-height:310px;resize:vertical"></textarea></section><section class="panel"><p class="eyebrow">Medspa wedge campaign</p><h2>${esc(DATA.growth.medspaCampaign.positioning)}</h2><h3>Hooks</h3><ul>${DATA.growth.medspaCampaign.hooks.map(h=>`<li>${esc(h)}</li>`).join('')}</ul><h3>Pain signals</h3><ul>${DATA.growth.medspaCampaign.painSignals.map(h=>`<li>${esc(h)}</li>`).join('')}</ul></section></div>`}
function fill(t,l){return t.replaceAll('{{business}}',l.business).replaceAll('{{industry}}',l.industry).replaceAll('{{weakness}}',(l.weaknesses||[''])[0]).replaceAll('{{angle}}',l.angle).replaceAll('{{offer}}',l.offer)}
function composeFor(id){route('outreach');setTimeout(()=>{$('#leadPick').value=id;makePitch()},0)}
function makePitch(){const l=DATA.leads.find(x=>x.id===$('#leadPick').value)||DATA.leads[0],v=DATA.growth.outreachVault;$('#pitchBox').value=`DM opener:\n${fill(v.dmShort,l)}\n\nEmail:\n${fill(v.emailFirstTouch,l)}\n\nLoom script:\n${fill(v.loomScript,l)}\n\nPhone opener:\n${fill(v.phoneOpener,l)}`}
function openDrawer(html){const d=$('#drawer');d.innerHTML=`<div style="display:flex;justify-content:space-between;gap:12px;align-items:start"><div>${html}</div><button class="btn" onclick="$('#drawer').classList.remove('open')">Close</button></div>`;d.classList.add('open')}
function briefing(){const top=[...DATA.leads].sort((a,b)=>b.score-a.score).slice(0,3);openDrawer(`<p class="eyebrow">Morning briefing</p><h2>Today: pipeline over polishing.</h2><p>1) Send precision first touches to ${top.map(l=>esc(l.business)).join(', ')}. 2) Use medspa wedge first unless a higher-urgency reply appears. 3) Keep proof labels clear: demo/projection until real client evidence exists.</p><h3>Top moves</h3><ul>${DATA.growth.todayMoves.slice(0,4).map(m=>`<li><b>${esc(m.title)}:</b> ${esc(m.outcome)}</li>`).join('')}</ul>`)}
function proofRules(){openDrawer(`<p class="eyebrow">Proof guardrails</p><h2>What can be claimed?</h2>${DATA.premiumOps.proofLedger.rules.map(r=>`<p class="proofrule">${esc(r)}</p>`).join('')}`)}
function snapshot(){const snap={generatedAt:new Date().toISOString(),metrics:DATA.metrics,topLeads:DATA.leads.slice().sort((a,b)=>b.score-a.score).slice(0,5).map(l=>({business:l.business,score:l.score,offer:l.offer,upside:l.estBookings*l.avgValue})),nextMoves:DATA.growth.todayMoves.slice(0,3).map(m=>m.title)};navigator.clipboard?.writeText(JSON.stringify(snap,null,2));openDrawer(`<p class="eyebrow">Snapshot copied</p><pre class="terminal">${esc(JSON.stringify(snap,null,2))}</pre>`)}
const views={cockpit,leads,profit,offers,swarm,ops,automations,demos,proof,outreach};function route(id='cockpit'){id=views[id]?id:'cockpit';setActive(id);$('#app').innerHTML=views[id]();if(id==='leads'){renderLeadList();['q','industry','sort'].forEach(x=>$('#'+x).addEventListener('input',renderLeadList))}if(id==='profit'){updateProfit();['deals','setup','monthly','months'].forEach(x=>$('#'+x).addEventListener('input',updateProfit))}if(id==='swarm')$('#launchSwarm').addEventListener('click',runSwarm);if(id==='outreach'){$('#makePitch').addEventListener('click',makePitch);$('#copyPitch').addEventListener('click',()=>{navigator.clipboard?.writeText($('#pitchBox').value);toast('Pitch copied')});makePitch()}}
buildNav();$('#briefBtn').addEventListener('click',briefing);$('#snapshotBtn').addEventListener('click',snapshot);$('#truthBtn').addEventListener('click',proofRules);window.route=route;window.composeFor=composeFor;route((location.hash||'#cockpit').slice(1));
</script></body></html>
